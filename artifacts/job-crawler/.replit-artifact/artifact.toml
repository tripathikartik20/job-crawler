kind = "web"
previewPath = "/"
title = "LinkedIn Job Crawler"
version = "1.0.0"
id = "artifacts/job-crawler"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20455
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/job-crawler run dev"

[services.env]
PORT = "20455"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/job-crawler", "run", "build"]
publicDir = "artifacts/job-crawler/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
